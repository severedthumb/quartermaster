<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='UTF-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1.0'>
        <link rel='preconnect' href='https://fonts.googleapis.com'>
        <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
        <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Pirata+One&display=swap'>
        <link rel='stylesheet' href='styles.css'>
        <script src='script.js' defer></script>
        <title>quartermaster</title>
    </head>

    <body>
        <header>
            <h1>quartermaster</h1>
            <h2>a full-stack web application for TTRPG player inventory management</h2>
        </header>

        <div class='character-selection'>
            <h3>choose your character</h3>
        </div>

        <div class='character-details'>
            <div class='details-container'>
                <div class='details-nc'>
                    <h4 class='character-name'></h4>
                    <h5 class='character-class'></h5>
                </div>

                <div class='details-coins'></div>
            </div>

            <h6>inventory</h6>
            <div class='inventory'></div>

            <h6>go shopping</h6>
            <a id='link-general-goodes'>
                <div class='shop-link'><p>General Goode's General Goods</p></div>
            </a>
            <div class='shop-link'><p>Faron's Forge</p></div>
            <div class='shop-link'><p>Pertelote's Apothecary</p></div>
        </div>

    </body>
</html>
