<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='UTF-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1.0'>
        <link rel='preconnect' href='https://fonts.googleapis.com'>
        <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
        <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Pirata+One&display=swap'>
        <link rel='stylesheet' href='styles.css'>
        <script src='script.js' defer></script>
        <title>quartermaster</title>
    </head>
    <body>
        <header>
            <!-- NOTE: h1 followed directly by h2 is bad practice. Fix this later. -->
            <h1>quartermaster</h1>
            <h2>a full-stack web application for TTRPG player inventory management</h2>
        </header>

        <div class='character-selection'>
            <h3>choose your character</h3>

            <div class='character-option button-cade'>
                <p>Cade</p>
            </div>

            <div class='character-option'>
                <p>Hammer</p>
            </div>

            <div class='character-option'>
                <p>Harbeck</p>
            </div>

            <div class='character-option'>
                <p>Pete</p>
            </div>

            <div class='character-option'>
                <p>Waldor</p>
            </div>

        </div> <!-- END OF CHARACTER SELECTION DIV-->

        <div class='character-details'>
            <h4>Waldor Highbinder</h4>
            <h5>elf wizard, level 8</h5>
            <h6>inventory</h6>
            <div class='inventory'>
                <div class='inventory-item'>
                    <p>item example</p>
                    <button class='button-sell-item'>sell for 3 gp</button>
                </div>

                <div class='inventory-item'>
                    <p>another item</p>
                    <button class='button-sell-item'>sell for 8 gp</button>
                </div>

                <div class='inventory-item'>
                    <p>another item</p>
                    <button class='button-sell-item'>sell for 8 gp</button>
                </div>

                <div class='inventory-item'>
                    <p>another item</p>
                    <button class='button-sell-item'>sell for 8 gp</button>
                </div>
            </div>
        </div>

    </body>
</html>
